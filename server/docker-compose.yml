version: "3.9"

services:
  web-scraper:
    build: .
    ports:
      - "8001:8001"
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8001
      - ENVIRONMENT=production
      - API_USERNAME=admin
      - API_PASSWORD=change_me
    volumes:
      - scraper-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  scraper-data:
